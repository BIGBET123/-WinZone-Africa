<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WinZone Africa</title>
<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0f172a;
    color:white;
}

header{
    background:#16a34a;
    padding:20px;
    text-align:center;
    font-size:28px;
    font-weight:bold;
}

.hero{
    text-align:center;
    padding:60px 20px;
}

.btn{
    background:#16a34a;
    color:white;
    border:none;
    padding:15px 25px;
    border-radius:8px;
    cursor:pointer;
}

.cards{
    display:flex;
    gap:20px;
    justify-content:center;
    flex-wrap:wrap;
    padding:20px;
}

.card{
    background:#1e293b;
    width:220px;
    padding:20px;
    border-radius:12px;
    text-align:center;
}

footer{
    text-align:center;
    padding:20px;
}
</style>
</head>
<body>
<header>
WINZONE AFRICA
</header>
<section class="hero">
<h1>Welcome to WinZone Africa</h1>
<p>Your website is now live.</p>
<button class="btn">Get Started</button>
</section>
<section class="cards">
<div class="card">
<h2>Wallet</h2>
<p>Add wallet information here</p>
</div>
<div class="card">
<h2>Games</h2>
<p>Add games here</p>
</div>
<div class="card">
<h2>Profile</h2>
<p>Add profile details here</p>
</div>
</section>
<footer>
© 2026 WinZone Africa
</footer>
</body>
</html>
